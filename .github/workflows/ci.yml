name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.x'
  WORKING_DIR: mirrorbooth

jobs:
  test:
    name: Tests & Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze

      - name: Test
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

  build-android-debug:
    name: Android Debug Build (APK)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-${{ github.sha }}
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios-debug:
    name: iOS Debug Build (Simulator)
    runs-on: macos-15
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: pod install --repo-update

      - name: Build iOS (simulator, no signing)
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter build ios --debug --simulator --no-codesign

      - name: Package simulator .app
        working-directory: ${{ env.WORKING_DIR }}/build/ios/iphonesimulator
        run: zip -r "$GITHUB_WORKSPACE/mirrorbooth-ios-simulator-${{ github.sha }}.zip" Runner.app

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-simulator-${{ github.sha }}
          path: mirrorbooth-ios-simulator-${{ github.sha }}.zip
          retention-days: 7
