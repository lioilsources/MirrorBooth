name: Release Linux

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build & Release Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            desktop-file-utils

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        working-directory: mirrorbooth
        run: flutter pub get

      - name: Build Linux (debug)
        working-directory: mirrorbooth
        run: flutter build linux --debug

      - name: Package as tar.gz
        run: |
          tar -czf "MirrorBooth-${{ github.ref_name }}-Linux.tar.gz" \
            -C mirrorbooth/build/linux/x64/debug/bundle .

      - name: Package as AppImage (icon + .desktop)
        run: |
          set -e
          APP_DIR="mirrorbooth"
          APP_NAME="MirrorBooth"
          BUNDLE="$APP_DIR/build/linux/x64/debug/bundle"
          BIN=$(grep -m1 'set(BINARY_NAME' "$APP_DIR/linux/CMakeLists.txt" | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Binary: $BIN"

          rm -rf AppDir
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r "$BUNDLE"/. AppDir/usr/bin/
          cp "$APP_DIR/linux/app_icon.png" "AppDir/usr/share/icons/hicolor/256x256/apps/$APP_NAME.png"
          cp "$APP_DIR/linux/app_icon.png" "AppDir/$APP_NAME.png"

          cat > "AppDir/$APP_NAME.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=$APP_NAME
          Exec=$BIN
          Icon=$APP_NAME
          Categories=Utility;
          Terminal=false
          EOF
          cp "AppDir/$APP_NAME.desktop" "AppDir/usr/share/applications/$APP_NAME.desktop"

          cat > AppDir/AppRun <<EOF
          #!/bin/sh
          HERE=\$(dirname "\$(readlink -f "\$0")")
          exec "\$HERE/usr/bin/$BIN" "\$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract >/dev/null   # avoid needing FUSE on CI
          ARCH=x86_64 ./squashfs-root/AppRun AppDir "$APP_NAME-${{ github.ref_name }}-x86_64.AppImage"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MirrorBooth-${{ github.ref_name }}-Linux.tar.gz
            MirrorBooth-${{ github.ref_name }}-x86_64.AppImage
          name: MirrorBooth ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
