name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Release Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        working-directory: mirrorbooth
        run: flutter pub get

      # ffmpeg_kit_flutter_new's windows/CMakeLists.txt downloads the FFmpegKit
      # zip and extracts it with `cmake -E tar` into a dir reached through Flutter's
      # .plugin_symlinks symlink; libarchive refuses ("Cannot extract through
      # symlink"). Pre-extract it ourselves and point the plugin at it via
      # FFMPEGKIT_LOCAL_DIR, which makes the plugin file(COPY) instead of tar.
      - name: Prefetch FFmpegKit (avoid CMake extract-through-symlink)
        shell: pwsh
        run: |
          $ver = "8.0.0"; $pkg = "full-gpl"; $arch = "x86_64"
          $zip = "ffmpeg-kit-windows-$arch-$pkg-$ver.zip"
          $url = "https://github.com/sk3llo/ffmpeg_kit_flutter/releases/download/$ver-$pkg-windows/$zip"
          $out = Join-Path $env:RUNNER_TEMP "ffmpegkit"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Invoke-WebRequest -Uri $url -OutFile (Join-Path $env:RUNNER_TEMP $zip)
          Expand-Archive -Path (Join-Path $env:RUNNER_TEMP $zip) -DestinationPath $out -Force
          "FFMPEGKIT_LOCAL_DIR=$out" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Windows (release)
        working-directory: mirrorbooth
        run: flutter build windows --release
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS

      - name: Package as ZIP
        shell: pwsh
        run: |
          $src = "mirrorbooth\build\windows\x64\runner\Release"
          $dest = "MirrorBooth-${{ github.ref_name }}-Windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MirrorBooth-${{ github.ref_name }}-Windows.zip
          name: MirrorBooth ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
