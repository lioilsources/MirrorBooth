name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Release Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        working-directory: mirrorbooth
        run: flutter pub get

      - name: Build Windows (debug)
        working-directory: mirrorbooth
        run: flutter build windows --debug

      - name: Package as ZIP
        shell: pwsh
        run: |
          $src = "mirrorbooth\build\windows\x64\runner\Debug"
          $dest = "MirrorBooth-${{ github.ref_name }}-Windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MirrorBooth-${{ github.ref_name }}-Windows.zip
          name: MirrorBooth ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
