name: mirrorbooth
description: "Real-time symmetric face mirror using selfie camera."
publish_to: 'none'
version: 2.0.3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0
  flutter_shaders: ^0.1.3
  flutter_webrtc: ^0.14.0
  socket_io_client: ^2.0.3+1
  flutter_riverpod: ^2.5.1
  permission_handler: ^11.3.1
  gal: ^1.1.2
  wakelock_plus: ^1.2.10
  image: ^4.2.0
  path_provider: ^2.1.5
  sensors_plus: ^6.1.1
  record: ^6.0.0
  ffmpeg_kit_flutter_new: 4.3.2  # pinned: Windows bundle prefetched in CI (FFMPEGKIT_LOCAL_DIR)
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# Desktop icons only (mobile icons are maintained separately); source = iOS master.
flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  shaders:
    - shaders/filter_glow.frag
    - shaders/filter_slim.frag
    - shaders/filter_doll.frag
    - shaders/filter_big_nose.frag
    - shaders/filter_alien.frag
    - shaders/filter_melt.frag
    - shaders/filter_pencil.frag
    - shaders/filter_comic.frag
    - shaders/filter_glitch.frag
    - shaders/filter_neon.frag
    - shaders/filter_thermal.frag
    - shaders/filter_oil.frag
    - shaders/filter_crt.frag
    - shaders/filter_pop_art.frag
