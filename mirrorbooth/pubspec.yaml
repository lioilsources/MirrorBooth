name: mirrorbooth
description: "Real-time symmetric face mirror using selfie camera."
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0
  flutter_shaders: ^0.1.3
  flutter_webrtc: ^0.14.0
  socket_io_client: ^2.0.3+1
  flutter_riverpod: ^2.5.1
  permission_handler: ^11.3.1
  gal: ^1.1.2
  wakelock_plus: ^1.2.10
  image: ^4.2.0
  path_provider: ^2.1.5
  sensors_plus: ^6.1.1
  record: ^6.0.0
  ffmpeg_kit_flutter_new: ^4.1.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  shaders:
    - shaders/mirror.frag
    - shaders/filter_pencil.frag
    - shaders/filter_comic.frag
    - shaders/filter_cel_shade.frag
    - shaders/filter_glitch.frag
    - shaders/filter_pixel_art.frag
    - shaders/filter_neon.frag
    - shaders/filter_watercolor.frag
    - shaders/filter_charcoal.frag
    - shaders/filter_halftone.frag
    - shaders/filter_thermal.frag
    - shaders/filter_psychedelic.frag
    - shaders/filter_oil.frag
    - shaders/filter_crt.frag
    - shaders/filter_manga.frag
    - shaders/filter_star_wars.frag
    - shaders/filter_winx.frag
    - shaders/filter_bluey.frag
    - shaders/filter_spongebob.frag
    - shaders/filter_adventure_time.frag
    - shaders/filter_gravity_falls.frag
    - shaders/filter_mlp.frag
    - shaders/filter_pokemon.frag
    - shaders/filter_classic_disney.frag
    - shaders/filter_cartoon_80s.frag
    - shaders/filter_pop_art.frag
